```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio | AI Visual Composer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/dist/Midi.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #050505; 
            color: #ffffff;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-button {
            transition: all 0.3s ease;
            box-shadow: 0 0 0px rgba(6, 182, 212, 0);
        }
        .glow-button:hover:not(:disabled) {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            transform: translateY(-2px);
        }
        .wave-bar {
            width: 4px;
            background: #06b6d4;
            border-radius: 2px;
            transition: height 0.1s ease;
        }
        #console-output::-webkit-scrollbar { width: 4px; }
        #console-output::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 opacity-20">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-900 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-4xl space-y-6">
        <!-- Header -->
        <header class="flex justify-between items-center px-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter italic text-cyan-400">JADDY STUDIO</h1>
                <p class="text-xs text-zinc-500 font-mono">INTELLIGENT COMPOSER V2.5</p>
            </div>
            <div id="connection-badge" class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1 rounded-full">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-tighter">Gemini Ready</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left Control Column -->
            <div class="md:col-span-2 space-y-6">
                <div class="glass-panel p-6 rounded-[2rem] space-y-4">
                    <div class="flex justify-between items-end">
                        <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Inspiración o Prompt Musical</label>
                        <span id="char-count" class="text-[10px] text-zinc-600">0/500</span>
                    </div>
                    <textarea id="userInput" 
                        class="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-sm focus:border-cyan-500/50 outline-none h-32 transition-all resize-none placeholder-zinc-700"
                        placeholder="Describe el sentimiento, el género o pega una URL de imagen para analizar..."></textarea>
                    
                    <div class="flex gap-3">
                        <button id="composeBtn" onclick="processComposition()" class="glow-button flex-1 bg-cyan-500 text-black font-bold py-4 rounded-xl flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-wand-magic-sparkles"></i> COMPONER AHORA
                        </button>
                    </div>
                </div>

                <!-- Visualizer -->
                <div class="glass-panel p-6 rounded-[2rem] h-40 flex items-center justify-center gap-1 overflow-hidden relative">
                    <div id="visualizer-overlay" class="absolute inset-0 flex items-center justify-center bg-black/60 z-10 text-zinc-500 text-xs font-mono uppercase">
                        Esperando señal de audio...
                    </div>
                    <div id="bars-container" class="flex items-end gap-1 h-24">
                        <!-- Bars generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Right Status Column -->
            <div class="space-y-6">
                <div class="glass-panel p-6 rounded-[2rem] space-y-6">
                    <div>
                        <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">Estado del Sistema</h3>
                        <div id="mood-tag" class="inline-block bg-zinc-800 text-zinc-400 px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Neutral</div>
                    </div>

                    <div class="space-y-3">
                        <button id="playBtn" onclick="togglePlayback()" disabled class="w-full py-3 rounded-xl border border-white/10 text-xs font-bold hover:bg-white/5 transition-all flex items-center justify-center gap-2 disabled:opacity-30">
                            <i class="fas fa-play"></i> REPRODUCIR
                        </button>
                        <button id="downloadMidi" onclick="exportMidi()" disabled class="w-full py-3 rounded-xl border border-white/10 text-xs font-bold hover:bg-white/5 transition-all flex items-center justify-center gap-2 disabled:opacity-30">
                            <i class="fas fa-file-export"></i> EXPORTAR MIDI
                        </button>
                    </div>

                    <div id="console-output" class="bg-black/50 p-4 rounded-xl h-44 overflow-y-auto font-mono text-[9px] text-zinc-500 space-y-1">
                        <div class="text-cyan-500">> Jaddy Studio inicializado.</div>
                        <div>> Esperando entrada del usuario...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyCGh8XyHA_RhyDwCril6xyTrbqkeNGZN4c"; 
        let sampler, currentMelody = [], isPlaying = false;
        let meter, visualizerInterval;

        // Inicialización de Audio
        async function initAudio() {
            log("Cargando bancos de sonido...");
            sampler = new Tone.Sampler({
                urls: { "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3" },
                baseUrl: "https://tonejs.github.io/audio/salamander/",
                onload: () => {
                    log("Módulo de piano listo.");
                    document.getElementById('visualizer-overlay').innerHTML = "Audio Motor Online";
                }
            }).toDestination();
            
            meter = new Tone.Meter();
            sampler.connect(meter);
            createVisualizer();
        }

        function log(msg) {
            const out = document.getElementById('console-output');
            const entry = document.createElement('div');
            entry.textContent = `> ${msg}`;
            out.appendChild(entry);
            out.scrollTop = out.scrollHeight;
        }

        function createVisualizer() {
            const container = document.getElementById('bars-container');
            for(let i=0; i<32; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar h-2';
                container.appendChild(bar);
            }
        }

        function updateVisualizer() {
            const bars = document.querySelectorAll('.wave-bar');
            const level = meter.getValue();
            const normalized = Math.max(0, (level + 60) / 60);
            
            bars.forEach(bar => {
                const height = 4 + (Math.random() * normalized * 80);
                bar.style.height = `${height}px`;
                bar.style.background = isPlaying ? '#06b6d4' : '#333';
            });
        }

        async function processComposition() {
            const input = document.getElementById('userInput').value;
            if(!input) return;

            const btn = document.getElementById('composeBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> PROCESANDO...`;

            try {
                log("Consultando inteligencia de Géminis...");
                
                const systemPrompt = `Eres un motor de composición musical. Basado en el prompt, devuelve un JSON con:
                1. 'mood': una palabra (nostalgic, epic, dark, happy).
                2. 'bpm': entre 60 y 160.
                3. 'notes': un array de objetos { 'note': 'C4', 'time': '0:0:0', 'duration': '8n', 'velocity': 0.7 }.
                Crea melodías de 4 a 8 compases que sean armónicamente coherentes. SOLO JSON.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                currentMelody = result.notes;
                document.getElementById('mood-tag').innerText = result.mood;
                document.getElementById('mood-tag').className = `inline-block bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-lg text-[10px] font-bold uppercase`;
                
                log(`Composición finalizada: ${result.mood.toUpperCase()} @ ${result.bpm} BPM`);
                
                document.getElementById('playBtn').disabled = false;
                document.getElementById('downloadMidi').disabled = false;
                document.getElementById('visualizer-overlay').classList.add('hidden');

            } catch (error) {
                log("ERROR: Fallo en la neurona compositiva.");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-wand-magic-sparkles"></i> COMPONER AHORA`;
            }
        }

        async function togglePlayback() {
            if (isPlaying) {
                Tone.Transport.stop();
                Tone.Transport.cancel();
                isPlaying = false;
                document.getElementById('playBtn').innerHTML = `<i class="fas fa-play"></i> REPRODUCIR`;
                clearInterval(visualizerInterval);
            } else {
                await Tone.start();
                log("Iniciando secuencia...");
                
                currentMelody.forEach(n => {
                    Tone.Transport.schedule((time) => {
                        sampler.triggerAttackRelease(n.note, n.duration, time, n.velocity);
                    }, n.time);
                });

                Tone.Transport.start();
                isPlaying = true;
                document.getElementById('playBtn').innerHTML = `<i class="fas fa-stop"></i> DETENER`;
                visualizerInterval = setInterval(updateVisualizer, 100);
            }
        }

        function exportMidi() {
            const midi = new Midi();
            const track = midi.addTrack();
            currentMelody.forEach(n => {
                track.addNote({
                    name: n.note,
                    time: Tone.Time(n.time).toSeconds(),
                    duration: Tone.Time(n.duration).toSeconds(),
                    velocity: n.velocity
                });
            });
            const blob = new Blob([midi.toArray()], { type: "audio/midi" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "jaddy_studio_comp.mid";
            a.click();
            log("MIDI exportado satisfactoriamente.");
        }

        window.onload = initAudio;
    </script>
</body>
</html>
