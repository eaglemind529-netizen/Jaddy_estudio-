```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Piano Solo | Real Emotion Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --piano-gold: #c5a059;
            --piano-black: #0a0a0a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--piano-black); 
            color: #d4d4d8;
            overflow-x: hidden;
        }

        .serif { font-family: 'Playfair Display', serif; }
        
        .piano-gradient {
            background: radial-gradient(circle at top right, #1a1a1a 0%, #050505 100%);
        }

        .gold-glow {
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.1);
        }

        .loading-text {
            letter-spacing: 0.3em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .key-viz {
            transition: all 0.1s ease;
            transform-origin: bottom;
        }
    </style>
</head>
<body class="min-h-screen piano-gradient flex flex-col items-center p-6 md:p-12">

    <div class="w-full max-w-4xl">
        <!-- Header Elegante -->
        <header class="text-center mb-12">
            <h1 class="serif text-5xl md:text-7xl font-black text-white italic mb-2 tracking-tighter">
                Piano <span class="text-[var(--piano-gold)]">Solo</span>
            </h1>
            <p class="text-zinc-500 font-light text-sm uppercase tracking-[0.4em]">Emotional Interpretations</p>
        </header>

        <!-- Estado del Motor -->
        <div id="loader" class="mb-12 text-center">
            <button id="init-btn" onclick="initPiano()" class="px-10 py-4 border border-[var(--piano-gold)] text-[var(--piano-gold)] hover:bg-[var(--piano-gold)] hover:text-black transition-all duration-500 uppercase text-xs font-bold tracking-widest rounded-full">
                Activar Mecanismo de Piano
            </button>
            <div id="loading-status" class="hidden">
                <p class="loading-text text-[var(--piano-gold)] text-[10px] font-bold uppercase">Afinando cuerdas reales...</p>
                <div class="w-48 h-[1px] bg-zinc-800 mx-auto mt-4 overflow-hidden">
                    <div id="load-progress" class="h-full bg-[var(--piano-gold)] w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <!-- Consola de Interpretación -->
        <main id="main-ui" class="opacity-20 pointer-events-none transition-opacity duration-1000 space-y-8">
            <div class="relative bg-zinc-900/40 p-8 rounded-3xl border border-white/5 gold-glow">
                <label class="block text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-6 italic">¿Cómo quieres que se sienta hoy?</label>
                
                <textarea id="pianoPrompt" 
                    class="w-full bg-transparent border-none text-2xl md:text-3xl serif italic text-white placeholder-zinc-800 focus:ring-0 resize-none h-32"
                    placeholder="Ej: Un piano sensual, íntimo, al estilo de Alicia Keys..."></textarea>
                
                <div class="flex flex-col md:flex-row justify-between items-center gap-6 mt-8 pt-8 border-t border-white/5">
                    <div class="flex gap-4">
                        <div class="text-left">
                            <span class="block text-[9px] text-zinc-600 uppercase font-bold">Resonancia</span>
                            <span id="reverb-label" class="text-sm text-zinc-300">Sala de Concierto</span>
                        </div>
                    </div>
                    
                    <button id="interpretBtn" onclick="interpretEmotion()" class="w-full md:w-auto px-12 py-5 bg-[var(--piano-gold)] text-black font-bold rounded-2xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-feather-pointed"></i> INTERPRETAR
                    </button>
                </div>
            </div>

            <!-- Visualizador de Teclas -->
            <div class="flex justify-center items-end gap-1 h-32 px-4" id="visualizer">
                <!-- Se genera por JS -->
            </div>

            <!-- Controles de Reproducción -->
            <div class="flex justify-center gap-8 items-center">
                <button id="playBtn" disabled onclick="togglePlayback()" class="group flex flex-col items-center gap-2">
                    <div id="playCircle" class="w-16 h-16 rounded-full border border-zinc-700 flex items-center justify-center group-hover:border-[var(--piano-gold)] transition-colors">
                        <i id="playIcon" class="fas fa-play text-white group-hover:text-[var(--piano-gold)]"></i>
                    </div>
                    <span class="text-[9px] uppercase tracking-widest text-zinc-600">Reproducir Sesión</span>
                </button>
            </div>
        </main>
    </div>

    <!-- Logger Discreto -->
    <div id="status-log" class="fixed bottom-6 right-6 text-[9px] font-mono text-zinc-700 uppercase"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script>
        const apiKey = "";
        let piano, reverb, delay;
        let isPlaying = false;
        let currentSequence = [];

        function log(msg) {
            document.getElementById('status-log').innerText = `> ${msg}`;
        }

        async function initPiano() {
            document.getElementById('init-btn').classList.add('hidden');
            document.getElementById('loading-status').classList.remove('hidden');
            
            try {
                await Tone.start();
                
                // Efectos de alta fidelidad
                reverb = new Tone.Reverb({ decay: 4, wet: 0.35 }).toDestination();
                delay = new Tone.FeedbackDelay("8n", 0.2).connect(reverb);
                
                // Sampler de Piano Salamander (Grand Piano real)
                piano = new Tone.Sampler({
                    urls: {
                        "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                        "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                        "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                        "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                        "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                        "A5": "A5.mp3", "C6": "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3",
                        "A6": "A6.mp3", "C7": "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3"
                    },
                    release: 1,
                    baseUrl: "https://tonejs.github.io/audio/salamander/",
                    onload: () => {
                        document.getElementById('load-progress').style.width = '100%';
                        setTimeout(() => {
                            document.getElementById('loading-status').classList.add('hidden');
                            document.getElementById('main-ui').classList.remove('opacity-20', 'pointer-events-none');
                            log("PIANO AFINADO Y LISTO");
                        }, 500);
                    }
                }).connect(delay);

                // Crear visualizador
                const vis = document.getElementById('visualizer');
                for(let i=0; i<32; i++) {
                    const k = document.createElement('div');
                    k.className = "key-viz flex-1 bg-zinc-900 border-x border-black h-2";
                    vis.appendChild(k);
                }

            } catch (e) {
                log("ERROR DE CARGA");
            }
        }

        async function interpretEmotion() {
            const prompt = document.getElementById('pianoPrompt').value;
            if(!prompt) return;

            const btn = document.getElementById('interpretBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> ESCRIBIENDO EMOCIÓN...';

            try {
                const systemPrompt = `Eres un pianista virtuoso. Interpreta la emoción del usuario y escribe una pieza para Piano Solo.
                - Usa variaciones de 'velocity' (0.3 para suave/sensual, 0.9 para intenso).
                - Devuelve JSON: {"bpm": 70, "notes": [{"time": "0:0:0", "note": "C4", "dur": "2n", "vel": 0.5}]}.
                - Si es sensual, usa acordes menores con séptimas (m7, maj7) y tiempos lentos.
                - Si es un estilo de artista, imita sus voicings.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                currentSequence = result.notes;
                Tone.Transport.bpm.value = result.bpm || 80;
                
                document.getElementById('playBtn').disabled = false;
                log("PIEZA COMPUESTA CON ÉXITO");
            } catch (err) {
                log("FALLO EN LA INTERPRETACIÓN");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-feather-pointed"></i> INTERPRETAR';
            }
        }

        function togglePlayback() {
            if (isPlaying) {
                Tone.Transport.stop();
                Tone.Transport.cancel();
                isPlaying = false;
                document.getElementById('playIcon').className = "fas fa-play text-white";
                log("SESIÓN DETENIDA");
            } else {
                Tone.Transport.cancel();
                
                currentSequence.forEach(n => {
                    Tone.Transport.schedule((time) => {
                        piano.triggerAttackRelease(n.note, n.dur, time, n.vel || 0.6);
                        animateKey();
                    }, n.time);
                });

                Tone.Transport.start("+0.1");
                isPlaying = true;
                document.getElementById('playIcon').className = "fas fa-stop text-[var(--piano-gold)]";
                log("REPRODUCIENDO...");
            }
        }

        function animateKey() {
            const keys = document.querySelectorAll('.key-viz');
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            randomKey.style.height = "100%";
            randomKey.style.backgroundColor = "var(--piano-gold)";
            setTimeout(() => {
                randomKey.style.height = "4px";
                randomKey.style.backgroundColor = "#18181b";
            }, 300);
        }
    </script>
</body>
</html>
