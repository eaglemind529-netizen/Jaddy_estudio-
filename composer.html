```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Piano Solo | Grabación y MIDI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Inter:wght@300;400;600&display=swap');
        :root { --piano-gold: #c5a059; --piano-black: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background: var(--piano-black); color: #d4d4d8; min-height: 100vh; overflow: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .piano-gradient { background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); }
        .gold-glow { box-shadow: 0 0 50px rgba(197, 160, 89, 0.08); border: 1px solid rgba(197, 160, 89, 0.15); }
        .btn-gold { background: var(--piano-gold); color: black; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2); }
        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .note-particle {
            position: absolute;
            bottom: 20%;
            color: var(--piano-gold);
            font-family: serif;
            pointer-events: none;
            animation: floatUp 3s linear forwards;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-300px) translateX(20px); opacity: 0; }
        }
    </style>
</head>
<body class="piano-gradient flex flex-col items-center justify-center p-4">

    <div id="loader" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <h1 class="serif text-4xl text-[var(--piano-gold)] italic mb-8 animate-pulse">Piano Solo</h1>
        <button id="start-btn" onclick="startApp()" class="px-12 py-4 border border-[var(--piano-gold)] text-[var(--piano-gold)] uppercase tracking-[0.3em] text-xs font-bold hover:bg-[var(--piano-gold)] hover:text-black transition-all">
            Cargar Instrumentos
        </button>
        <p id="loading-msg" class="hidden mt-4 text-[10px] uppercase tracking-widest text-zinc-500">Preparando grabación...</p>
    </div>

    <div class="w-full max-w-3xl relative z-10">
        <header class="text-center mb-8">
            <h2 class="serif text-6xl md:text-7xl font-black text-white italic tracking-tighter mb-2">
                Piano <span class="text-[var(--piano-gold)]">Solo</span>
            </h2>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.5em]">Estudio de Grabación Profesional</p>
        </header>

        <div class="bg-zinc-900/60 backdrop-blur-2xl p-8 md:p-10 rounded-[2.5rem] gold-glow relative overflow-hidden">
            <div id="particle-container" class="absolute inset-0 pointer-events-none"></div>

            <textarea id="moodInput" 
                class="w-full bg-transparent border-none text-2xl md:text-3xl serif italic text-white placeholder-zinc-800 focus:ring-0 resize-none h-24 relative z-10"
                placeholder="Escribe el sentimiento para la obra..."></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6 relative z-10">
                <button id="actionBtn" onclick="handleAction()" class="btn-gold py-4 rounded-xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-3 order-1 md:col-span-2">
                    <span id="btn-label">Grabar Composición</span>
                </button>

                <button id="downloadAudio" onclick="downloadRecordedAudio()" class="hidden bg-zinc-800 text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-zinc-700 transition-all flex items-center justify-center gap-2 order-2">
                    Descargar MP3/WAV
                </button>
                
                <button id="downloadMidi" onclick="downloadMidiFile()" class="hidden bg-zinc-800 text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-zinc-700 transition-all flex items-center justify-center gap-2 order-3">
                    Descargar MIDI
                </button>
            </div>

            <div class="flex items-center justify-center gap-3 mt-8 pt-6 border-t border-white/5 relative z-10">
                <div id="status-led" class="w-2 h-2 rounded-full bg-zinc-700"></div>
                <span id="status-text" class="text-[9px] uppercase font-bold text-zinc-500 tracking-widest">Listo para grabar</span>
            </div>
        </div>
    </div>

    <script>
        let sampler, recorder, reverb, delay;
        let isPlaying = false;
        let audioBlob = null;
        let currentMidi = null;

        const progressions = {
            nostalgic: [
                { chord: ["A2", "E3", "A3", "C4"], scale: ["A3", "B3", "C4", "E4", "G4"] },
                { chord: ["F2", "C3", "F3", "A3"], scale: ["F3", "G3", "A3", "C4", "E4"] },
                { chord: ["D2", "A2", "D3", "F3"], scale: ["D3", "E3", "F3", "A3", "C4"] },
                { chord: ["E2", "B2", "E3", "G#3"], scale: ["E3", "F#3", "G#3", "B3", "D4"] }
            ],
            peaceful: [
                { chord: ["C2", "G2", "C3", "E3"], scale: ["C3", "D3", "E3", "G3", "A3"] },
                { chord: ["F2", "C3", "F3", "A3"], scale: ["F3", "G3", "A3", "C4", "D4"] },
                { chord: ["G2", "D3", "G3", "B3"], scale: ["G3", "A3", "B3", "D4", "E4"] },
                { chord: ["A2", "E3", "A3", "C4"], scale: ["A3", "B3", "C4", "E4", "G4"] }
            ]
        };

        async function startApp() {
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('loading-msg').classList.remove('hidden');

            await Tone.start();
            
            recorder = new Tone.Recorder();
            const compressor = new Tone.Compressor(-18, 4).toDestination();
            reverb = new Tone.Reverb({ decay: 6, wet: 0.4 }).connect(compressor);
            delay = new Tone.FeedbackDelay("8n.", 0.3).connect(reverb);
            
            // Conectar todo al grabador
            compressor.connect(recorder);

            sampler = new Tone.Sampler({
                urls: { "C4": "C4.mp3", "A4": "A4.mp3", "C1": "C1.mp3", "A1": "A1.mp3" },
                baseUrl: "https://tonejs.github.io/audio/salamander/",
                onload: () => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').remove(), 1000);
                }
            }).connect(delay);
        }

        function handleAction() {
            if (isPlaying) return;
            playAndRecord();
        }

        async function playAndRecord() {
            const mood = document.getElementById('moodInput').value.toLowerCase();
            let selectedProg = mood.includes('paz') || mood.includes('feliz') ? progressions.peaceful : progressions.nostalgic;

            isPlaying = true;
            audioBlob = null;
            currentMidi = new Midi();
            const track = currentMidi.addTrack();
            track.name = "Piano Solo";

            document.getElementById('btn-label').innerText = "Grabando...";
            document.getElementById('actionBtn').disabled = true;
            document.getElementById('downloadAudio').classList.add('hidden');
            document.getElementById('downloadMidi').classList.add('hidden');
            document.getElementById('status-led').className = 'w-2 h-2 rounded-full bg-red-500 animate-pulse';
            document.getElementById('status-text').innerText = "Capturando Audio y MIDI";

            recorder.start();
            Tone.Transport.cancel();
            
            let currentTime = 0;
            const cycles = 2; // Grabación de 16 segundos aprox

            for(let i = 0; i < cycles; i++) {
                selectedProg.forEach(step => {
                    // Acordes (MIDI + Audio)
                    step.chord.forEach(note => {
                        Tone.Transport.schedule(time => {
                            sampler.triggerAttackRelease(note, "1n", time, 0.2);
                            track.addNote({ name: note, time: currentTime, duration: 2, velocity: 0.3 });
                        }, currentTime);
                    });

                    // Melodía (MIDI + Audio)
                    for(let j = 0; j < 4; j++) {
                        const noteTime = currentTime + (j * 0.5);
                        const randomNote = step.scale[Math.floor(Math.random() * step.scale.length)];
                        const vel = 0.4 + Math.random() * 0.3;

                        Tone.Transport.schedule(time => {
                            sampler.triggerAttackRelease(randomNote, "4n", time, vel);
                            track.addNote({ name: randomNote, time: noteTime, duration: 0.5, velocity: vel });
                            spawnParticle();
                        }, noteTime);
                    }
                    currentTime += 2;
                });
            }

            Tone.Transport.start();
            
            Tone.Transport.schedule(async (time) => {
                Tone.Transport.stop();
                audioBlob = await recorder.stop();
                
                isPlaying = false;
                document.getElementById('btn-label').innerText = "Nueva Grabación";
                document.getElementById('actionBtn').disabled = false;
                document.getElementById('status-led').className = 'w-2 h-2 rounded-full bg-green-500';
                document.getElementById('status-text').innerText = "Grabación Completa";
                document.getElementById('downloadAudio').classList.remove('hidden');
                document.getElementById('downloadMidi').classList.remove('hidden');
            }, currentTime + 1);
        }

        function downloadRecordedAudio() {
            if (!audioBlob) return;
            const url = URL.createObjectURL(audioBlob);
            const anchor = document.createElement("a");
            anchor.download = "piano-solo-jaddy.webm";
            anchor.href = url;
            anchor.click();
        }

        function downloadMidiFile() {
            if (!currentMidi) return;
            const anchor = document.createElement("a");
            anchor.download = "piano-solo-jaddy.mid";
            const midiArray = currentMidi.toArray();
            const blob = new Blob([midiArray], { type: "audio/midi" });
            anchor.href = URL.createObjectURL(blob);
            anchor.click();
        }

        function spawnParticle() {
            const container = document.getElementById('particle-container');
            const p = document.createElement('div');
            p.className = 'note-particle';
            p.style.left = (Math.random() * 80 + 10) + '%';
            p.innerText = ['♩', '♪', '♫', '♬'][Math.floor(Math.random()*4)];
            container.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }
    </script>
</body>
</html>
