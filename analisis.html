```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio | Precision Presets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #eee;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #111;
            border-radius: 2rem;
            border: 1px solid #222;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header {
            padding: 2rem;
            background: linear-gradient(to bottom, #1a1a1a, #111);
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .mono { font-family: 'JetBrains+Mono', monospace; }

        .plugin-card {
            background: #161616;
            margin: 15px;
            border-radius: 1.5rem;
            border-left: 4px solid #facc15;
            padding: 1.5rem;
        }

        .param-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .param-item {
            background: #1d1d1d;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #282828;
        }

        .label { color: #888; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
        .value { color: #facc15; font-size: 0.9rem; font-weight: bold; }

        .band-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 1fr;
            gap: 5px;
            padding: 5px 0;
            border-bottom: 1px solid #222;
            font-size: 0.75rem;
        }

        .btn-generate {
            background: #facc15;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3); }
        
        .loading-bar {
            height: 4px;
            background: #222;
            width: 100%;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress { height: 100%; background: #facc15; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1 class="text-2xl font-black italic tracking-tighter">JADDY <span class="text-yellow-400">PRECISION</span></h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Generador de Parámetros Exactos</p>
            
            <div class="mt-6 flex flex-col items-center">
                <input type="file" id="audio-upload" class="hidden" accept="audio/*">
                <button onclick="document.getElementById('audio-upload').click()" class="bg-zinc-800 hover:bg-zinc-700 text-white px-6 py-3 rounded-full text-xs font-bold transition flex items-center gap-2">
                    <i class="fas fa-wave-square text-yellow-400"></i> CARGAR AUDIO PARA ANALIZAR
                </button>
                <div id="file-name" class="text-[10px] text-zinc-500 mt-2 italic"></div>
            </div>

            <button id="calc-btn" class="btn-generate w-full mt-6 py-4 rounded-2xl hidden">
                CALCULAR CADENA SERIAL
            </button>
            <div id="loading-container" class="hidden">
                <div class="loading-bar"><div id="progress" class="progress"></div></div>
                <p class="text-[9px] text-yellow-400 mt-2 uppercase font-bold text-center">Escaneando armónicos y dinámica...</p>
            </div>
        </div>

        <div id="results" class="hidden pb-10">
            <!-- Los plugins se inyectan aquí -->
        </div>
    </div>

    <script>
        const audioInput = document.getElementById('audio-upload');
        const calcBtn = document.getElementById('calc-btn');
        const loadingContainer = document.getElementById('loading-container');
        const results = document.getElementById('results');
        const progress = document.getElementById('progress');

        audioInput.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                document.getElementById('file-name').innerText = e.target.files[0].name;
                calcBtn.classList.remove('hidden');
            }
        });

        calcBtn.addEventListener('click', () => {
            calcBtn.classList.add('hidden');
            loadingContainer.classList.remove('hidden');
            let p = 0;
            const interval = setInterval(() => {
                p += 5;
                progress.style.width = p + '%';
                if(p >= 100) {
                    clearInterval(interval);
                    showResults();
                }
            }, 100);
        });

        function showResults() {
            loadingContainer.classList.add('hidden');
            results.classList.remove('hidden');
            
            // Datos simulados de precisión (En un entorno real, aquí se procesaría el buffer de audio)
            const data = [
                {
                    title: "1. EQ QUIRÚRGICO (Fruity Parametric EQ 2)",
                    type: "eq",
                    bands: [
                        { b: 1, type: "High Pass", f: "115 Hz", g: "0 dB", q: "0.70" },
                        { b: 2, type: "Peaking", f: "245 Hz", g: "-3.2 dB", q: "45%" },
                        { b: 3, type: "Peaking", f: "480 Hz", g: "-2.5 dB", q: "30%" },
                        { b: 4, type: "Peaking", f: "820 Hz", g: "-1.8 dB", q: "20%" },
                        { b: 5, type: "Peaking", f: "2.1 kHz", g: "+1.2 dB", q: "15%" },
                        { b: 6, type: "Peaking", f: "5.4 kHz", g: "0 dB", q: "25%" },
                        { b: 7, type: "High Shelf", f: "12 kHz", g: "0 dB", q: "50%" }
                    ]
                },
                {
                    title: "2. COMP 1: PICOS (Fruity Limiter - Comp Mode)",
                    type: "grid",
                    params: [
                        { l: "Threshold", v: "-14.2 dB" },
                        { l: "Ratio", v: "6.5 : 1" },
                        { l: "Attack", v: "0.45 ms" },
                        { l: "Release", v: "80 ms" },
                        { l: "Knee", v: "15%" },
                        { l: "Gain (Post)", v: "+1.5 dB" }
                    ]
                },
                {
                    title: "3. EQ TONO: BRILLO (Fruity Parametric EQ 2)",
                    type: "eq",
                    bands: [
                        { b: 1, type: "Low Shelf", f: "200 Hz", g: "+1.0 dB", q: "40%" },
                        { b: 2, type: "Peaking", f: "3.5 kHz", g: "+2.8 dB", q: "25%" },
                        { b: 3, type: "High Shelf", f: "10.5 kHz", g: "+4.5 dB", q: "55%" },
                        { b: "4-7", type: "Flat", f: "-", g: "0 dB", q: "-" }
                    ]
                },
                {
                    title: "4. COMP 2: CUERPO (Fruity Compressor)",
                    type: "grid",
                    params: [
                        { l: "Threshold", v: "-22.0 dB" },
                        { l: "Ratio", v: "2.2 : 1" },
                        { l: "Attack", v: "35 ms" },
                        { l: "Release", v: "150 ms" },
                        { l: "Type", v: "Vintage" },
                        { l: "Gain", v: "+3.0 dB" }
                    ]
                },
                {
                    title: "5. DE-ESSER (Patcher - Preset Intelligent)",
                    type: "grid",
                    params: [
                        { l: "Center Freq", v: "6850 Hz" },
                        { l: "Bandwidth", v: "1.2 Oct" },
                        { l: "Threshold", v: "-18 dB" },
                        { l: "Reduction", v: "Max -4dB" }
                    ]
                }
            ];

            results.innerHTML = data.map(plugin => `
                <div class="plugin-card">
                    <h3 class="text-[11px] font-black uppercase mb-4 text-white italic">${plugin.title}</h3>
                    ${plugin.type === 'eq' ? `
                        <div class="bg-black/40 p-3 rounded-xl">
                            <div class="band-row opacity-50 font-bold">
                                <span>BND</span><span>TYPE</span><span>FREQ</span><span>GAIN</span>
                            </div>
                            ${plugin.bands.map(b => `
                                <div class="band-row mono">
                                    <span class="text-yellow-400 font-bold">${b.b}</span>
                                    <span class="text-[9px]">${b.type}</span>
                                    <span>${b.f}</span>
                                    <span class="${b.g.includes('-') ? 'text-red-400' : 'text-green-400'}">${b.g}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="param-grid">
                            ${plugin.params.map(p => `
                                <div class="param-item">
                                    <div class="label">${p.l}</div>
                                    <div class="value mono">${p.v}</div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>
            `).join('');
        }
    </script>
</body>
</html>

```
