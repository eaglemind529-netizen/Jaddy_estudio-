```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio | Mentor de Mezcla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background-color: var(--black); color: white; font-family: sans-serif; }
        .gold-text { color: var(--gold); font-weight: 900; text-transform: uppercase; }
        .plugin-card { background: rgba(255,255,255,0.05); border: 1px solid #D4AF37; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .btn-add { background: #D4AF37; color: black; font-weight: bold; padding: 10px; border-radius: 10px; width: 100%; margin-top: 5px; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-center gold-text text-2xl mb-6 italic">Jaddy Mentor</h1>
    
    <div class="mb-8">
        <p class="text-xs text-gold mb-2">SELECCIONA TUS PLUGINS:</p>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="agregar('Nativos', 'Ecualizador')" class="btn-add">EQ NATIVO</button>
            <button onclick="agregar('Waves', 'Compresor')" class="btn-add">COMP WAVES</button>
            <button onclick="agregar('Fabfilter', 'Ecualizador')" class="btn-add">PRO-Q 3</button>
            <button onclick="agregar('Nativos', 'Compresor')" class="btn-add">LIMITER</button>
        </div>
    </div>

    <div id="pantalla-resultados" class="hidden">
        <h2 class="gold-text text-sm mb-4">Hoja de Ajustes Técnicos:</h2>
        <div id="lista-instrucciones"></div>
    </div>

    <script src="logic.js"></script>

    <script>
        let miCadena = [];

        function agregar(marca, tipo) {
            miCadena.push({ marca: marca, tipo: tipo });
            alert("Agregaste: " + tipo + " de " + marca);
            mostrarInstrucciones();
        }

        function mostrarInstrucciones() {
            const contenedor = document.getElementById('lista-instrucciones');
            const pantalla = document.getElementById('pantalla-resultados');
            
            // Usamos el "Cerebro" que está en logic.js
            if (window.JaddyStudioBrain) {
                const pasos = window.JaddyStudioBrain.procesarCadena(miCadena, null);
                
                contenedor.innerHTML = pasos.map(p => `
                    <div class="plugin-card">
                        <p class="text-gold font-bold text-xs uppercase">Paso ${p.paso}: ${p.nombre}</p>
                        <p class="text-sm mt-2">${p.detalle}</p>
                    </div>
                `).join('');
                
                pantalla.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
