```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaddy Studio | Análisis Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Librería para visualizar la onda de audio -->
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background-color: var(--black); color: white; font-family: 'Inter', sans-serif; }
        .gold-text { color: var(--gold); background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .analyzer-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.1); border-radius: 2rem; backdrop-filter: blur(10px); }
        #waveform { width: 100%; height: 120px; background: rgba(0,0,0,0.2); border-radius: 1rem; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #996515 100%); color: black; font-weight: 900; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); shadow: 0 0 20px rgba(212,175,55,0.4); }
        .result-item { animation: fadeIn 0.5s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <!-- Encabezado -->
        <div class="flex justify-between items-center mb-10">
            <button onclick="window.location.href='index.html'" class="text-gray-500 hover:text-gold transition text-xs font-bold">
                <i class="fas fa-chevron-left mr-2"></i> VOLVER AL PANEL
            </button>
            <div class="text-right">
                <h1 class="text-2xl font-black gold-text italic">ANÁLISIS DE VOZ</h1>
                <p class="text-[9px] tracking-[0.3em] text-gray-500">INTELIGENCIA ARTIFICIAL JADDY INC</p>
            </div>
        </div>

        <!-- Zona de Carga y Visualización -->
        <div class="analyzer-card p-6 md:p-10 mb-8 text-center">
            <div id="drop-zone" class="border-2 border-dashed border-yellow-900/20 rounded-[2rem] p-8 transition hover:border-gold/40 cursor-pointer mb-6">
                <div id="upload-prompt">
                    <i class="fas fa-cloud-upload-alt text-4xl text-gold/30 mb-4"></i>
                    <h2 class="text-lg font-bold mb-1">SUBIR ARCHIVO DE VOZ</h2>
                    <p class="text-gray-500 text-xs">Soporta WAV, MP3 o M4A (Máx 10MB)</p>
                </div>
                <div id="waveform-container" class="hidden">
                    <div id="waveform"></div>
                    <p class="text-[10px] text-gold mt-4 font-mono tracking-widest uppercase">Onda de Audio Detectada</p>
                </div>
                <input type="file" id="audio-input" class="hidden" accept="audio/*">
            </div>

            <div class="flex flex-col gap-4">
                <button id="btn-select" onclick="document.getElementById('audio-input').click()" class="bg-white/5 border border-white/10 py-3 rounded-full text-xs font-bold hover:bg-white/10 transition">
                    CAMBIAR ARCHIVO
                </button>
                <button id="btn-process" class="btn-gold py-5 rounded-3xl hidden">
                    <i class="fas fa-microchip mr-2"></i> INICIAR ANÁLISIS TÉCNICO
                </button>
            </div>
        </div>

        <!-- Panel de Resultados -->
        <div id="results-panel" class="hidden">
            <h3 class="gold-text font-black text-sm mb-6 tracking-widest uppercase">Hoja de Ajustes para Plugins</h3>
            <div id="results-list" class="space-y-4">
                <!-- Los resultados de logic.js se inyectan aquí -->
            </div>
        </div>
    </div>

    <!-- Scripts de Integración -->
    <script type="module">
        import JaddyAPI from './connection.js';
        window.JaddyAPI = JaddyAPI;
    </script>
    <script src="logic.js"></script>

    <script>
        const audioInput = document.getElementById('audio-input');
        const btnProcess = document.getElementById('btn-process');
        const uploadPrompt = document.getElementById('upload-prompt');
        const waveformContainer = document.getElementById('waveform-container');
        
        let wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#222',
            progressColor: '#D4AF37',
            cursorColor: '#D4AF37',
            barWidth: 3,
            barRadius: 3,
            responsive: true,
            height: 120
        });

        audioInput.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                wavesurfer.load(url);
                uploadPrompt.classList.add('hidden');
                waveformContainer.classList.remove('hidden');
                btnProcess.classList.remove('hidden');
            }
        };

        btnProcess.onclick = async function() {
            const file = audioInput.files[0];
            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> ESCANEANDO FRECUENCIAS...';

            try {
                // 1. Llamar a la conexión de IA
                const datosAudio = await window.JaddyAPI.analyzeAudio(file);
                
                // 2. Usar la lógica para obtener ajustes de plugins
                // Simulamos una cadena básica: EQ -> COMP
                const cadenaPlugins = [
                    { tipo: 'ecualizador', marca: 'fabfilter' },
                    { tipo: 'compresor', marca: 'waves' },
                    { tipo: 'deesser', marca: 'nativos' }
                ];

                const ajustes = window.JaddyStudioBrain.generarInstrucciones(cadenaPlugins, datosAudio);

                // 3. Mostrar Resultados en pantalla
                const resultsList = document.getElementById('results-list');
                resultsList.innerHTML = ajustes.map((ajuste, i) => `
                    <div class="result-item analyzer-card p-6 border-l-4 border-l-gold" style="animation-delay: ${i * 0.2}s">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black text-gold uppercase tracking-tighter">${ajuste.plugin}</span>
                            <span class="text-[9px] text-gray-600">PASO ${ajuste.paso}</span>
                        </div>
                        <p class="text-sm text-gray-300 leading-relaxed">${ajuste.texto}</p>
                    </div>
                `).join('');

                document.getElementById('results-panel').classList.remove('hidden');
                document.getElementById('results-panel').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                alert("Error al conectar con el servidor de análisis.");
            } finally {
                this.innerHTML = '<i class="fas fa-check-circle mr-2"></i> ANÁLISIS COMPLETADO';
            }
        };
    </script>
</body>
</html>
