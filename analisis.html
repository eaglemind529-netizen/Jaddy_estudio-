```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaddy Studio | Mentor de Mezcla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background-color: var(--black); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .gold-text { color: var(--gold); background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 2rem; backdrop-filter: blur(10px); }
        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #996515 100%); color: black; font-weight: 900; transition: all 0.3s; cursor: pointer; border: none; }
        .btn-gold:active { transform: scale(0.98); opacity: 0.9; }
        .plugin-tag { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px; border-radius: 12px; font-size: 10px; cursor: pointer; font-weight: 800; transition: 0.2s; text-transform: uppercase; text-align: center; }
        .selected-plugin { background: #D4AF37; color: #000000 !important; padding: 8px 14px; border-radius: 10px; font-weight: 900; font-size: 10px; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .step-card { border-left: 4px solid var(--gold); background: rgba(255,255,255,0.02); margin-bottom: 15px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button onclick="window.location.href='index.html'" class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em]">
                <i class="fas fa-arrow-left mr-2"></i> Dashboard
            </button>
            <div class="text-right">
                <h1 class="text-xl font-black gold-text italic">JADDY MENTOR</h1>
                <p class="text-[7px] text-gray-500 tracking-[0.4em]">CADENA DE VOZ PROFESIONAL</p>
            </div>
        </div>

        <!-- Marcas -->
        <div class="mb-6 grid grid-cols-3 gap-2">
            <button id="brand-nativos" onclick="setBrand('nativos')" class="py-2 rounded-lg border border-gold bg-gold text-black font-black text-[9px] uppercase">Nativos</button>
            <button id="brand-waves" onclick="setBrand('waves')" class="py-2 rounded-lg border border-gold/30 text-gold font-black text-[9px] uppercase">Waves</button>
            <button id="brand-fabfilter" onclick="setBrand('fabfilter')" class="py-2 rounded-lg border border-gold/30 text-gold font-black text-[9px] uppercase">FabFilter</button>
        </div>

        <div class="glass-card p-5 mb-6">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[9px] font-black text-gold uppercase tracking-widest text-left">Rack de Plugins</h3>
                <button onclick="clearChain()" class="text-[8px] text-red-500 font-black uppercase">Limpiar</button>
            </div>
            
            <div id="chain-display" class="flex flex-wrap gap-2 mb-4 p-3 rounded-xl bg-black/20 min-h-[60px] items-center">
                <span class="text-gray-600 text-[10px] italic">Configura tu cadena...</span>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <button onclick="addToChain('ecualizador')" class="plugin-tag">EQ</button>
                <button onclick="addToChain('compresor')" class="plugin-tag">Comp</button>
                <button onclick="addToChain('deesser')" class="plugin-tag">De-Ess</button>
                <button onclick="addToChain('saturacion')" class="plugin-tag">Saturación</button>
                <button onclick="addToChain('reverb')" class="plugin-tag">Reverb</button>
                <button onclick="addToChain('delay')" class="plugin-tag">Delay</button>
            </div>
        </div>

        <div class="glass-card p-6 text-center mb-6 border-2 border-dashed border-gold/10">
            <div id="drop-zone" onclick="document.getElementById('audio-file').click()" class="cursor-pointer">
                <div id="upload-ui">
                    <i class="fas fa-microphone-alt text-2xl text-gold/30 mb-2"></i>
                    <p class="text-[10px] font-black text-white uppercase">Cargar Vocal para Escaneo</p>
                </div>
                <div id="waveform-ui" class="hidden">
                    <div id="waveform"></div>
                </div>
            </div>
            <input type="file" id="audio-file" class="hidden" accept="audio/*">
        </div>

        <button id="btn-action" onclick="runAnalysis()" class="btn-gold w-full py-5 rounded-2xl hidden uppercase tracking-[0.2em] text-xs mb-10 shadow-lg">
            INICIAR ESCANEO IA
        </button>

        <div id="results" class="hidden space-y-4 pb-20 text-left">
            <div class="glass-card p-4 bg-gold/5 border-gold/20 text-center">
                <p id="ia-diagnosis" class="text-[11px] text-gray-300 italic font-medium"></p>
            </div>
            <div id="list-steps"></div>
        </div>
    </div>

    <!-- CARGA DE SCRIPTS CON FALLBACK -->
    <script src="logic.js"></script>
    <script src="connection.js"></script>

    <script>
        let selectedBrand = 'nativos';
        let chain = [];
        let selectedFile = null;

        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#333',
            progressColor: '#D4AF37',
            barWidth: 2,
            height: 60,
            responsive: true
        });

        function setBrand(brand) {
            selectedBrand = brand;
            ['nativos', 'waves', 'fabfilter'].forEach(b => {
                document.getElementById('brand-' + b).className = b === brand ? 
                "py-2 rounded-lg border border-gold bg-gold text-black font-black text-[9px] uppercase" : 
                "py-2 rounded-lg border border-gold/30 text-gold font-black text-[9px] uppercase";
            });
        }

        function addToChain(type) {
            chain.push({ tipo: type, marca: selectedBrand });
            updateChainUI();
        }

        function clearChain() { chain = []; updateChainUI(); }

        function updateChainUI() {
            const container = document.getElementById('chain-display');
            if (chain.length === 0) {
                container.innerHTML = '<span class="text-gray-600 text-[10px] italic">Configura tu cadena...</span>';
            } else {
                container.innerHTML = chain.map((c, i) => `
                    <div class="selected-plugin">
                        <span class="opacity-40 text-[8px]">${i+1}</span>
                        ${c.tipo.substring(0,4).toUpperCase()}
                    </div>
                `).join('<i class="fas fa-plus text-[8px] text-gold/30 mx-0.5"></i>');
            }
            checkState();
        }

        document.getElementById('audio-file').onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                wavesurfer.load(URL.createObjectURL(selectedFile));
                document.getElementById('upload-ui').classList.add('hidden');
                document.getElementById('waveform-ui').classList.remove('hidden');
                checkState();
            }
        };

        function checkState() {
            const btn = document.getElementById('btn-action');
            btn.style.display = (chain.length > 0 && selectedFile) ? 'block' : 'none';
        }

        // LÓGICA DE PROCESAMIENTO INTERNA (Por si logic.js falla)
        const FallbackBrain = {
            procesar(chain, data) {
                return chain.map(p => {
                    if(p.tipo === 'ecualizador') return { nombre: `${p.marca.toUpperCase()} EQ`, detalle: `Atenuar -3dB en la zona de lodo (${data.frecuencia_critica}Hz) para limpiar la voz.` };
                    if(p.tipo === 'compresor') return { nombre: `${p.marca.toUpperCase()} COMP`, detalle: `Ratio 4:1, Attack rápido para controlar picos. Umbral ajustado para -4dB de reducción.` };
                    if(p.tipo === 'deesser') return { nombre: `${p.marca.toUpperCase()} DE-ESSER`, detalle: `Reducir sibilancia en los ${data.sibilancia}Hz con un umbral suave.` };
                    return { nombre: `${p.marca.toUpperCase()} ${p.tipo.toUpperCase()}`, detalle: `Ajuste optimizado por IA Jaddy para perfil tonal profesional.` };
                });
            }
        };

        async function runAnalysis() {
            const btn = document.getElementById('btn-action');
            const diag = document.getElementById('ia-diagnosis');
            
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> ESCANEANDO...';
            btn.disabled = true;

            try {
                let dataIA;
                // Intento de conexión real con el API Handler
                if (window.JaddyAPI && typeof window.JaddyAPI.analyzeAudio === 'function') {
                    const result = await window.JaddyAPI.analyzeAudio(selectedFile);
                    dataIA = {
                        frecuencia_critica: result?.muddy_freq || 400,
                        sibilancia: result?.sibilance_freq || 7500
                    };
                } else {
                    // Simulación inmediata si el conector no está listo
                    dataIA = { frecuencia_critica: 415, sibilancia: 7800 };
                }

                diag.innerText = `Jaddy IA: Escaneo completado. Resonancia detectada en ${dataIA.frecuencia_critica}Hz.`;

                // Procesar cadena (Usando logic.js o Fallback)
                let instrucciones;
                if (window.JaddyStudioBrain) {
                    instrucciones = window.JaddyStudioBrain.procesarCadena(chain, dataIA);
                } else {
                    instrucciones = FallbackBrain.procesar(chain, dataIA);
                }

                const listSteps = document.getElementById('list-steps');
                listSteps.innerHTML = instrucciones.map(ins => `
                    <div class="step-card p-5 rounded-xl shadow-lg border border-white/5">
                        <h5 class="text-gold font-black text-[9px] mb-2 uppercase tracking-widest text-left">${ins.nombre}</h5>
                        <p class="text-[11px] text-gray-200 leading-relaxed text-left">${ins.detalle}</p>
                    </div>
                `).join('');

                document.getElementById('results').classList.remove('hidden');
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
                btn.innerHTML = "ANÁLISIS COMPLETADO";
            } catch (error) {
                console.error(error);
                diag.innerText = "Error en el escaneo. Intente de nuevo.";
                btn.innerHTML = "INICIAR ESCANEO IA";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
